<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZK LIVE TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background: linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#0ea5e9);
  background-size:400% 400%;
  animation:bg 10s infinite;
}
@keyframes bg {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

#login{
  display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;
}
input,button{padding:10px;margin:5px;border-radius:8px;border:none;}
button{background:#2563eb;color:white;}

#app{display:none;}

.header{text-align:center;padding:10px;font-size:22px;color:#00eaff;}

video{width:100%;height:220px;background:black;}

#categories h2{padding-left:10px;}

.channels{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.channel{
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="login">
  <h2>📺 ZK LIVE TV</h2>
  <input id="user" placeholder="Username">
  <input id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app">
  <div class="header">📺 ZK LIVE TV</div>
  <video id="video" controls autoplay></video>
  <div id="categories"></div>
</div>

<script>
function login(){
  if(user.value=="zk" && pass.value=="1234"){
    login.style.display="none";
    app.style.display="block";
    loadChannels();
  } else alert("Wrong Login");
}

var video=document.getElementById("video");

function play(url){
  if(Hls.isSupported()){
    var hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else video.src=url;
}

async function loadChannels(){
  let res = await fetch('channels.json');
  let data = await res.json();

  let container=document.getElementById("categories");
  container.innerHTML="";

  data.categories.forEach(cat=>{
    let title=document.createElement("h2");
    title.innerText=cat.name;
    container.appendChild(title);

    let grid=document.createElement("div");
    grid.className="channels";

    cat.channels.forEach(ch=>{
      let div=document.createElement("div");
      div.className="channel";
      div.innerText=ch.name;
      div.onclick=()=>play(ch.url);
      grid.appendChild(div);
    });

    container.appendChild(grid);
  });
}
</script>

</body>
</html>
