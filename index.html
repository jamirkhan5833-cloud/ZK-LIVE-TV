<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZK LIVE TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#0ea5e9);
  background-size:400% 400%;
  animation:bg 10s infinite;
}
@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

#login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  position:relative;
  z-index:10;
}
input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}
button{
  background:#2563eb;
  color:white;
  position:relative;
  z-index:1000;
}

#app{display:none;}

.header{
  text-align:center;
  padding:10px;
  font-size:22px;
  color:#00eaff;
}

video{
  width:100%;
  height:220px;
  background:black;
}

.channels{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.channel{
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="login">
  <h2>📺 ZK LIVE TV</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app">
  <div class="header">📺 ZK LIVE TV</div>
  <video id="video" controls autoplay></video>
  <div id="channels"></div>
</div>

<script>
function login(){
  let u=document.getElementById("user").value.trim();
  let p=document.getElementById("pass").value.trim();

  if(u==="zk" && p==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadChannels();
  } else {
    alert("Wrong Login");
  }
}

var video=document.getElementById("video");

function play(url){
  if(Hls.isSupported()){
    var hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src=url;
  }
}

// 🔥 FIXED CHANNEL DATA (NO JSON NEEDED)
const channels = [
  {name:"News 1",url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"},
  {name:"News 2",url:"https://test-streams.mux.dev/test_001/stream.m3u8"},
  {name:"Movie 1",url:"https://test-streams.mux.dev/bbb-360p.m3u8"},
  {name:"Movie 2",url:"https://test-streams.mux.dev/playlist.m3u8"},
  {name:"Cartoon",url:"https://test-streams.mux.dev/playlist.m3u8"},
  {name:"Music",url:"https://test-streams.mux.dev/pts_shift/master.m3u8"},
  {name:"Live TV",url:"https://test-streams.mux.dev/dai-discontinuity-deltatre/manifest.m3u8"},
  {name:"Cinema",url:"https://test-streams.mux.dev/bbb-360p.m3u8"},
  {name:"Kids",url:"https://test-streams.mux.dev/playlist.m3u8"},
  {name:"Drama",url:"https://test-streams.mux.dev/test_001/stream.m3u8"}
];

function loadChannels(){
  let container=document.getElementById("channels");
  container.innerHTML="";

  channels.forEach(ch=>{
    let div=document.createElement("div");
    div.className="channel";
    div.innerText=ch.name;
    div.onclick=()=>play(ch.url);
    container.appendChild(div);
  });
}
</script>

</body>
</html>
