<!DOCTYPE html>
<html>
<head>
  <title>ZK LIVE TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #38bdf8;
    }

    video {
      width: 100%;
      height: 220px;
      background: black;
    }

    .channels {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #1e40af;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

<header>📺 ZK LIVE TV</header>

<video id="video" controls autoplay></video>

<div class="channels">
  <button class="btn" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">News 1</button>
  <button class="btn" onclick="play('https://test-streams.mux.dev/test_001/stream.m3u8')">Sports</button>
  <button class="btn" onclick="play('https://test-streams.mux.dev/bbb-360p.m3u8')">Movies</button>
  <button class="btn" onclick="play('https://test-streams.mux.dev/pts_shift/master.m3u8')">Music</button>
  <button class="btn" onclick="play('https://test-streams.mux.dev/playlist.m3u8')">Cartoon</button>
  <button class="btn" onclick="play('https://test-streams.mux.dev/dai-discontinuity-deltatre/manifest.m3u8')">Live TV</button>
</div>

<script>
var video = document.getElementById('video');

function play(url) {
  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  }
}
</script>

</body>
</html>
